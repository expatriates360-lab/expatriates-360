name: Monthly Database Backup

on:
  schedule:
    - cron: "0 2 1 * *"   # 02:00 UTC on the 1st of every month

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger backup endpoint
        run: |
          curl -s -X POST https://expatriates360.com/api/cron/backup \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
