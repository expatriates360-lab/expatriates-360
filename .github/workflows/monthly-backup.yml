name: Monthly Database Backup

on:
  schedule:
    - cron: "0 2 1 * *"   # 02:00 UTC on the 1st of every month
  workflow_dispatch:       # allows manual trigger from GitHub Actions UI

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger backup endpoint
        run: |
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST https://expatriates360.com/api/cron/backup \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json")
          echo "Response: $RESPONSE"
          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS" | cut -d: -f2)
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "Backup failed with status $HTTP_STATUS"
            exit 1
          fi
